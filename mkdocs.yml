site_name: Work Buddy
site_description: Personal agent framework built on Claude Code and MCP
repo_url: https://github.com/KadenMc/work-buddy

theme:
  name: material
  logo: logo.svg
  favicon: logo.svg
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            heading_level: 2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - tables

# Nav is auto-generated by docs_gen.py — do not edit manually
# AUTOGEN_NAV_START
nav:
  - Home: index.md
  - Handbook: handbook/index.md
# AUTOGEN_NAV_END
