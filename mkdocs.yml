site_name: Work Buddy
site_description: Personal agent framework built on Claude Code and MCP
repo_url: https://github.com/KadenMc/work-buddy

theme:
  name: material
  logo: logo_white.svg
  favicon: logo.svg
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            heading_level: 2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - tables

# Navigation is generated from the knowledge store by docs_gen.py at build time.
# This block is intentionally minimal in git so the full nav is never a committed,
# drift-prone artifact: CI runs `python -m work_buddy.knowledge.docs_gen --write`
# (which fills this block and writes docs/handbook/*) before building the site.
# To preview the real nav locally, run that command before `mkdocs serve`/`build`.
# AUTOGEN_NAV_START
nav:
- Home: index.md
# AUTOGEN_NAV_END