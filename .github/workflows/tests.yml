name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      WORK_BUDDY_SESSION_ID: ci-test-00000000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.11-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            venv-${{ runner.os }}-py3.11-

      - name: Install dependencies
        run: |
          # The lock file pins CUDA torch (2.11.0+cu126) from the dev machine's
          # supplemental source. CI needs CPU-only torch from PyPI, so we drop
          # the supplemental source and re-resolve.
          poetry source remove pytorch-cu126 2>/dev/null || true
          poetry lock --no-interaction
          poetry install --with dev --no-interaction

      - name: Run tests with coverage
        run: |
          poetry run pytest tests/ \
            --cov=work_buddy \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -q --tb=short

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false
