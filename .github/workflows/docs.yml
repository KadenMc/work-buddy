name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      WORK_BUDDY_SESSION_ID: docs-ci

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-docs-${{ runner.os }}-py3.11-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            venv-docs-${{ runner.os }}-py3.11-

      - name: Install dependencies
        run: |
          poetry source remove pytorch-cu126 2>/dev/null || true
          poetry lock --no-interaction
          poetry install --with docs --without dev --no-interaction

      - name: Generate handbook pages
        run: |
          poetry run python -m work_buddy.knowledge.docs_gen --write

      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          poetry run mkdocs gh-deploy --force
