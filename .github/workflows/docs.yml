name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      WORK_BUDDY_SESSION_ID: docs-ci

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.26"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Build docs environment (docs group + a lightweight importable package, no heavy runtime deps)
        run: |
          # docs_gen only needs work_buddy importable plus pyyaml (YAML parsing)
          # and networkx (DAG validation); skip the heavy runtime deps (torch).
          uv venv
          uv pip install --group docs
          uv pip install -e . --no-deps pyyaml networkx

      - name: Generate handbook pages
        run: .venv/bin/python -m work_buddy.knowledge.docs_gen --write

      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          .venv/bin/mkdocs gh-deploy --force
