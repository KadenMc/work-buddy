name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      WORK_BUDDY_SESSION_ID: docs-ci
      # Override the committed poetry.toml (virtualenvs.create=false, for local
      # conda-based dev) so CI keeps building a cached, managed venv. The env
      # var has higher precedence than the project poetry.toml.
      POETRY_VIRTUALENVS_CREATE: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-docs-${{ runner.os }}-py3.11-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-docs-${{ runner.os }}-py3.11-

      - name: Install dependencies
        run: |
          poetry install --only docs --no-interaction
          # docs_gen needs work_buddy.knowledge + pyyaml + networkx
          # (pyyaml for YAML parsing, networkx for DAG validation in load_store)
          # Make the package importable without installing heavy main deps
          pip install -e . --no-deps
          pip install pyyaml networkx

      - name: Generate handbook pages
        run: |
          poetry run python -m work_buddy.knowledge.docs_gen --write

      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          poetry run mkdocs gh-deploy --force
