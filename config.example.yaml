# work-buddy configuration
# Copy this file to config.yaml and customize for your setup.

# REQUIRED: paths to your Obsidian vault and repos directory
vault_root: "/path/to/your/obsidian/vault"
repos_root: "/path/to/your/repos"

bundles_dir: "bundles"
timezone: "America/New_York"   # IANA timezone for your location

# Centralized data directory for artifacts, runtime state, caches, and databases.
# Relative to repo root, or absolute path. Default: ".data" (dot-prefixed —
# Obsidian treats dot-prefixed directories as system folders and skips them,
# which matters when work-buddy is installed inside an Obsidian vault).
paths:
  data_root: ".data"

git:
  active_days: 30
  detail_days: 7
  max_commits: 20

obsidian:
  journal_dir: "journal"
  journal_days: 7
  recent_modified_days: 3
  tracked_folders:
    - "tasks"
  exclude_folders:
    - ".obsidian"
    - ".trash"
    - ".git"
    - "node_modules"
  wellness_days: 14
  api_port: 27124        # Obsidian Local REST API plugin port
  bridge_port: 27125     # work-buddy plugin port
  # config_dir: ".obsidian"   # Override if your vault uses Obsidian's
  #                             override-config-folder feature (a
  #                             non-default config-folder name, e.g.
  #                             ".obsidian-work"). Default is ".obsidian".

tasks:
  db_path: "tasks/task_metadata.db"
  event_lookback_hours: 48

workflows:
  run_lifecycle:
    # Auto-cancel a workflow run with no step progress for this long. An
    # orphaned run (agent stopped calling wb_advance) is reclaimed by the
    # in-process idle sweep once it crosses this threshold.
    idle_timeout_hours: 24
    # How often the in-process idle sweep runs (MCP gateway process).
    sweep_interval_minutes: 60
    # Reload incomplete runs from disk into the active-runs map when the
    # MCP gateway starts. Set false to disable restart recovery.
    recovery_enabled: true

embedding:
  service_port: 5124
  device: "auto"           # "auto" (GPU if available, else CPU), "cpu", or "cuda"
  default_model: "leaf-mt"
  models:
    leaf-mt:
      name: "MongoDB/mdbr-leaf-mt"
      dims: 1024
      eager: true
    leaf-ir-query:
      name: "MongoDB/mdbr-leaf-ir"
      dims: 768
      eager: true
    leaf-ir:
      name: "MongoDB/mdbr-leaf-ir-asym"
      dims: 768
      eager: false
      # Optional: offload document-side passage encoding to LM Studio.
      # When omitted (default), bulk document encoding uses the
      # sentence-transformers model above. When set to "lmstudio",
      # _encode_bulk_direct POSTs to LM Studio's /v1/embeddings
      # endpoint instead — moves ~500 MB of model RSS off the main
      # machine and lets a remote compute device (via LM Link) do
      # the work.
      #
      # Setup procedure (including the mandatory GGUF audit and drift
      # test): docs/handbook/features_lmstudio-offload-setup.md.
      # provider: lmstudio
      # lmstudio_model: text-embedding-snowflake-arctic-embed-m-v1.5
      # on_error: fallback   # "fallback" (default) silently falls
      #                      # back to sentence_transformer when LM
      #                      # Studio errors. "fail" re-raises — use
      #                      # for research workflows that require
      #                      # single-provenance vectors in the
      #                      # index. Observed drift between Q8
      #                      # GGUF and fp32 sentence-transformers
      #                      # is ~0.0002 cosine, so "fallback" is
      #                      # safe for retrieval quality.

# Optional: LM Studio as an offload target (embeddings and/or LLM).
# Base URL is the BARE server root — no /v1 suffix. The health check
# and embedding provider both append their own paths (/v1/models,
# /v1/embeddings). Leave commented to use LM Studio's default.
# lmstudio:
#   base_url: "http://localhost:1234"

messaging:
  db_path: "messages/messages.db"
  service_port: 5123
  mirror_enabled: false
  mirror_path: "messages/mirror"
  ttl_days: 30
  summary_ttl_days: 7

# Hindsight personal memory server (optional — disable if not using)
hindsight:
  base_url: "http://localhost:8888"
  bank_id: "my-memory"          # your personal memory bank identifier
  user_tag: "user:me"           # tag applied to all memory entries
  bank_mission: >-
    Persistent personal memory for context-aware assistance.
    Prioritize: preferences, habits, constraints, recurring patterns,
    relationships, values, work patterns, and durable decisions.
  retain_mission: >-
    Extract facts about the user: preferences, habits, constraints,
    relationships, emotional state, recurring patterns, values,
    and decisions. Capture behavioral cues for future adaptation.
  observations_mission: >-
    Consolidate recurring patterns in behavior, work habits,
    and decision-making. Track how constraints and priorities evolve.

dashboard:
  read_only: false          # disable mutating actions (investigate, palette execute, workflow respond)
  external_url: ""          # Tailscale HTTPS URL (e.g. "https://machine.tailnet.ts.net")
                            # enables "View in dashboard" links in Telegram notifications

chrome:
  snapshot_interval_minutes: 5
  ledger_window_days: 7

llm:
  default_model: "claude-haiku-4-5-20251001"
  models:
    haiku: "claude-haiku-4-5-20251001"
    sonnet: "claude-sonnet-4-6"
    opus: "claude-opus-4-6"
  default_tier: "haiku"
  cache_ttl_minutes: 30
  simhash_hamming_threshold: 3

  # Optional: local-inference backend hosts (LM Studio, vLLM, Ollama, llama.cpp).
  # With LM Link, the main machine runs LM Studio at localhost:1234 as the API surface;
  # actual inference is routed to whichever linked device has the requested model loaded.
  #
  # NOTE: you do NOT pick the endpoint kind here (openai-compat vs LM Studio native).
  # That is derived at dispatch time from the tier's ``tool_support`` flag — tool-calling
  # tiers use the native /api/v1/chat endpoint, non-tool tiers use /v1/chat/completions
  # so LM Studio's JIT auto-load works on cold requests. Just give us the host.
  # backends:
  #   lmstudio_local:
  #     base_url: "http://localhost:1234/v1"       # LM Studio on main machine; LM Link routes to remote device
  #     api_key_env: ""                            # LM Studio default: unauth. Set to the env var name if you enable auth.

  # Named profiles bind a friendly name (e.g. 'local_general') to a
  # concrete backend + model + limits. Reference via:
  #     mcp__work-buddy__wb_run("llm_call", {"profile": "local_general", ...})
  # profiles:
  #   local_general:                               # Active test target — fits fully on 8GB GPU
  #     backend: lmstudio_local
  #     model: "qwen/qwen3-4b"                     # Use the exact id from GET /v1/models
  #     max_output_tokens: 1024
  #     context_length: 8192
  #     execution_mode: local
  #   local_general_14b:                           # Aspirational — needs higher-VRAM device for full offload
  #     backend: lmstudio_local
  #     model: "qwen/qwen3-14b"
  #     max_output_tokens: 1536
  #     context_length: 8192
  #     execution_mode: local
  #   local_coding:                                # Aspirational — Qwen2.5-Coder-14B; higher-VRAM device recommended
  #     backend: lmstudio_local
  #     model: "qwen/qwen2.5-coder-14b"
  #     max_output_tokens: 2048
  #     context_length: 8192
  #     execution_mode: local

chats:
  specstory_days: 7
  claude_history_days: 7

ir:
  db_path: null
  rrf_k: 60
  dense_text_max_chars: 1500
  recency:
    enabled: true
    half_life_days: 14
    floor: 0.15

# Telegram bot (optional — set enabled: false to disable)
telegram:
  bot_token_env: "TELEGRAM_BOT_TOKEN"
  allowed_chat_ids: []
  enabled: false
  capture:
    note: "latest_journal"
    section: "Running Notes"
    position: "top"

# Background-triage overrides.
#
# Defaults (and the full knob list) live in `work_buddy/triage/config.py`.
# Only settings you want to change go here — everything else falls back
# to the shipped defaults. Common overrides:
#
#   triage:
#     agent_profile: local_general          # profile for per-item agent loop
#     segment:
#       max_tokens: 16384                   # bump for reasoning-heavy models
#       profile: local_long                 # split segmenter from agent
#     enrich:
#       enabled: false                      # skip IR context pre-fetch
#
#     # Verdict-pass gating. Per-source overrides win over the global
#     # default. See work_buddy/triage/config.py:KNOWN_VERDICT_PASS_SOURCES
#     # for the current key set.
#     verdict_pass:
#       enabled: false                      # global default for all sources
#       sources:
#         journal:                          # journal_triage_scan (Obsidian Running Notes)
#           enabled: false
#         inline:                           # inline_triage_scan (send-to-agent captures)
#           enabled: false
#         email:                            # email_triage_run (Thunderbird companion bridge)
#           enabled: false
#         web_browser:                      # chrome_triage_scan (Chrome tabs) — future
#           enabled: false
#
# triage: {}

sidecar:
  health_check_interval: 30
  max_service_crashes: 5
  restart_backoff_base: 5
  # Optional: pin the Python interpreter children are spawned with.
  # Without this, children inherit ``sys.executable`` from the daemon —
  # which is usually fine, but breaks when the daemon itself was
  # accidentally launched on the wrong interpreter (e.g. a Windows
  # scheduled task whose ``conda activate`` silently no-op'd, leaving
  # the daemon and every child on the base env). Setting this pins the
  # env regardless of how the daemon booted. Recommended on Windows.
  # python_executable: "C:/Users/Owner/miniforge3/envs/work-buddy/python.exe"
  # A service must miss this many consecutive probes before the daemon
  # restarts it. Guards against cascading false-positive restarts when
  # a single probe is late (e.g. a service is briefly busy).
  health_failure_threshold: 2
  # Background health-prober cadence (seconds). Independent of the
  # main loop — scheduler stalls cannot delay probes.
  health_probe_interval: 5
  health_probe_timeout: 2
  services:
    messaging:
      module: "work_buddy.messaging.service"
      port: 5123
      enabled: true
    embedding:
      module: "work_buddy.embedding"
      port: 5124
      enabled: true
    telegram:
      module: "work_buddy.telegram.service"
      port: 5125
      enabled: false   # enable after setting TELEGRAM_BOT_TOKEN
    mcp_gateway:
      module: "work_buddy.mcp_server"
      port: 5126
      args: ["--http"]
      enabled: true
    dashboard:
      module: "work_buddy.dashboard"
      port: 5127
      enabled: true
  # System jobs ship with work-buddy and live in this git-tracked directory.
  jobs_dir: "sidecar_jobs"
  # User jobs are personal cron tasks you author yourself — gitignored,
  # not shared across installs. Default location is `<paths.data_root>/user_jobs/`
  # (the data root is gitignored, so user jobs are too). Set this to override
  # with an absolute or repo-relative path. Empty = use the default.
  user_jobs_dir: ""
  exclusion_windows: []
    # Quiet hours example:
    # - start: "23:00"
    #   end: "08:00"
    #   days: [0, 1, 2, 3, 4, 5, 6]
  message_poll_interval: 15
  agent_spawn:
    model: "sonnet"
    timeout_seconds: 300
    max_budget_usd: 0.50

morning:
  phases:
    yesterday_close: true
    context_snapshot: true
    calendar: true
    task_briefing: true
    contract_check: true
    blindspot_scan: true
  context_hours: 24
  blindspot_depth: "light"
  max_mits: 3
  persist_briefing: true

# Email integration. Default provider is "thunderbird" (talks to the
# thunderbird-work-buddy companion add-on over a localhost HTTP bridge).
# Use "fake" to exercise the Python pipeline without any mail client.
email:
  enabled: true
  provider: "thunderbird"
  candidate_days_back: 2
  max_messages: 50
  unread_only: true
  include_body_chars: 4000

thunderbird:
  # HTTP timeout when calling the bridge. Bridge is local, so 10s is generous;
  # tighten if a slow IMAP folder sync is hanging requests.
  timeout_seconds: 10

# Calendar integration. Default provider is "obsidian_bridge" (reads Google
# Calendar via the Obsidian google-calendar plugin over the eval_js bridge).
# Use "fake" to exercise the Python pipeline without Obsidian, or "google_native"
# for direct own-OAuth access (no Obsidian dependency). The bridge capabilities
# are additionally gated by the `google_calendar` tool probe.
calendar:
  enabled: true
  provider: "obsidian_bridge"
  # Direct Google Calendar access via own OAuth (provider: "google_native").
  # Setup: create a Google Cloud project, enable the Calendar API, configure the
  # OAuth consent screen and PUBLISH IT TO "Production" (so the refresh token does
  # not expire), create a "Desktop app" OAuth client, and download its
  # client_secret.json. Point `client_secret_env` at an env var holding that
  # file's path. The refresh token is persisted under the data root
  # (.data/credentials/google_oauth_token.json) — never commit it.
  google_native:
    client_secret_env: "GOOGLE_OAUTH_CLIENT_SECRET"  # env var → path to client_secret.json
    scopes:
      - "https://www.googleapis.com/auth/calendar.events"  # least-privilege: CRUD on existing calendars

# Tool-availability probes used to gate capability dispatch. Set the
# matching `enabled` flag to false to skip a probe entirely (the
# capabilities that depend on it move into DISABLED_CAPABILITIES with
# "Disabled in config" as the reason).
tools:
  obsidian:
    enabled: true
  chrome_extension:
    enabled: true
  hindsight:
    enabled: true
  telegram:
    enabled: true
  smart_connections:
    enabled: true
  embedding:
    enabled: true
  messaging:
    enabled: true
  # Datacore plugin (vault structural query). Gates the MCP datacore_*
  # capabilities (datacore_query, datacore_run_plan, vault_recon, etc.) —
  # NOT the bundle-collection pipeline. The datacore_collector under
  # work_buddy/collectors/ is a no-op until CONTEXT_QUERIES is populated;
  # there is no separate "collection enabled" knob.
  datacore:
    enabled: true
  google_calendar:
    enabled: true
  # Thunderbird companion bridge — disabled by default. Flip to `true`
  # in config.local.yaml once you've installed thunderbird-work-buddy
  # and ticked at least one account in its options page.
  thunderbird:
    enabled: false

# Slice 4 — risk tolerance + amplifier policy.  Per-dimension ceilings
# for autonomous action; anything above forces consent (caps the
# operating tier at 2 = plan-and-execute).  Defaults are conservative;
# bump up over time as trust builds.  See work_buddy/automation/risk.py
# for the full schema.
risk_tolerance:
  financial:
    autonomous_max_cents: 50      # spend up to 50¢ without asking
  privacy:
    autonomous: none              # 'none' | 'internal' | 'public'
  accuracy:
    autonomous: low_stakes        # 'low_stakes' | 'consequential' | 'critical'
  compute:
    autonomous: background        # 'instant' | 'background' | 'expensive'

# Risk-amplifier gates.  Each ON setting forces consent when the
# named amplifier fires, regardless of how permissive the dimension
# levels are.  Conservative defaults (all ON); set false to opt out.
amplifier_policy:
  irreversible_requires_consent: true
  high_regret_requires_consent: true
  high_inference_uncertainty_requires_consent: true


# Conversation summarization (v2). See
# .data/designs/conversation-summarize/PRD.md for the design rationale.
conversation_observability:
  summaries:
    # v1 master switch — generates the legacy 8-topic single-call summary
    # via the 2h cron. Set to true to start collecting summaries at all.
    enabled: false
    # v2 master switch — when true:
    # - the queue worker (sidecar_jobs/summarization-worker.md) drains the
    #   summarization_queue on the 5min cadence
    # - refresh_observed_sessions enqueues changed sessions
    # - refresh_session_summaries (v1 legacy entry) no-ops to avoid race
    # Bump only after the §8 eval pass clears (PRD OQ19).
    use_incremental: false
    # Model chain for v2's LLM calls (PRD F5). First entry is the primary
    # tier; remaining are tried in order on transient errors (TIMEOUT,
    # CONTEXT_EXCEEDED, RATE_LIMITED, MALFORMED_RESPONSE, BACKEND_UNAVAILABLE,
    # EMPTY_CONTENT, MODEL_NOT_AVAILABLE). Valid tier names: local_fast,
    # local_tool_calling, frontier_fast, frontier_balanced, frontier_best.
    #
    # Default (when unset): [frontier_fast]. Haiku-only.
    # Recommended local-first chain: [local_fast, frontier_fast] —
    # tries local LLM first (free at inference), escalates to Haiku as
    # quality floor. Per PRD's long-term local-first target.
    model_chain: [frontier_fast]
    # Per-session cooldown — the worker skips a session for this many
    # minutes after its last successful refresh. Default 30; configurable
    # 15-60.
    cooldown_minutes: 30
    # Daily budget circuit-breaker — when today's summarization spend
    # (computed from agents/*/llm_costs.jsonl with trace_id starting
    # with "summarization.") exceeds this, the worker pauses until the
    # next day. Default $1.00 is generous given the ~$0.07/day baseline
    # at v2 Haiku rates.
    daily_budget_usd: 1.00
    # Per-call input token budget for the LLM (PRD OQ9). Default 32k —
    # tracks frontier_fast (Haiku) per the resolved default chain.
    per_call_budget_tokens: 32000
    # Pathway selection threshold (PRD OQ17). Route to chunked when
    # predicted input > pathway_threshold_ratio × per_call_budget.
    pathway_threshold_ratio: 0.85
    # Worker tick cap — max queue entries processed per tick. Bounds
    # one tick's work; backlogs catch up across many ticks under the
    # daily budget. Default 20.
    worker_tick_limit: 20
