<!doctype html>
<html lang="en" data-wb-scheme="dark" data-wb-skin="wb.default" data-wb-density="comfortable">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#15110f" />
    <script>
      (() => {
        const fallback = { scheme: "system", skinId: "wb.default" };
        const schemes = new Set(["system", "light", "dark"]);
        const skins = new Set([
          "wb.default",
          "wb.calm-workshop",
          "wb.studio",
          "wb.conformance-stress",
        ]);
        const densities = new Set(["compact", "comfortable", "spacious"]);
        let preference = fallback;

        try {
          const candidate = JSON.parse(
            localStorage.getItem("wb.theme.preference.v1") || "null",
          );
          if (
            candidate &&
            candidate.version === 1 &&
            schemes.has(candidate.scheme) &&
            skins.has(candidate.skinId)
          ) {
            preference = candidate;
          }
        } catch {
          preference = fallback;
        }

        const resolvedScheme =
          preference.scheme === "system"
            ? typeof window.matchMedia === "function" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
            : preference.scheme;

        document.documentElement.dataset.wbScheme = resolvedScheme;
        document.documentElement.dataset.wbSkin = preference.skinId;
        const storedDensity = localStorage.getItem("wb.appearance.density.v1");
        document.documentElement.dataset.wbDensity = densities.has(storedDensity)
          ? storedDensity
          : "comfortable";
        document.documentElement.style.colorScheme = resolvedScheme;
        const canvasColors = {
          "wb.default": { light: "#f6f1e9", dark: "#15110f" },
          "wb.calm-workshop": { light: "#f4f2ed", dark: "#0c1519" },
          "wb.studio": { light: "#f3f5f8", dark: "#11131a" },
          "wb.conformance-stress": { light: "#fff7ed", dark: "#1e1b4b" },
        };
        document
          .querySelector('meta[name="theme-color"]')
          ?.setAttribute(
            "content",
            canvasColors[preference.skinId][resolvedScheme],
          );
      })();
    </script>
    <meta name="application-name" content="work-buddy" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/app/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/app/icons/app-192.png" />
    <title>work-buddy dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
